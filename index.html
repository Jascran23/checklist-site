<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Briefing Profissional - Checklist de Site</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .form-card { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .section-title { border-left: 4px solid #2563eb; padding-left: 12px; margin-bottom: 20px; font-weight: 700; color: #1e293b; }
    </style>
</head>
<body class="py-10 px-4">

    <div class="max-w-3xl mx-auto">
        <!-- Header -->
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-gray-900">📋 Checklist Profissional de Site</h1>
            <p class="text-gray-600 mt-2">Preencha os detalhes abaixo para iniciarmos seu projeto com precisão.</p>
        </header>

        <!-- Form -->
        <!-- Substitua 'SEU_ID_FORMSPREE' pelo ID que você ganhará no formspree.io -->
        <form id="briefingForm" action="https://formspree.io/f/meevedrn" method="POST" class="space-y-8">
            
            <!-- 1. OBJETIVO -->
            <section class="form-card p-6">
                <h2 class="section-title text-xl uppercase tracking-wider">1. Objetivo do Site</h2>
                <div class="space-y-4">
                    <label class="block font-medium text-gray-700">Qual o principal objetivo?</label>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                        <label class="flex items-center space-x-2"><input type="checkbox" name="objetivo[]" value="Gerar Leads"> <span>Gerar leads (WhatsApp)</span></label>
                        <label class="flex items-center space-x-2"><input type="checkbox" name="objetivo[]" value="Vender"> <span>Vender produto</span></label>
                        <label class="flex items-center space-x-2"><input type="checkbox" name="objetivo[]" value="Apresentação"> <span>Apresentação da empresa</span></label>
                        <label class="flex items-center space-x-2"><input type="checkbox" name="objetivo[]" value="Agendamento"> <span>Agendamento</span></label>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Ação principal do cliente:</label>
                        <input type="text" name="acao_principal" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 bg-gray-50 border focus:ring-blue-500" placeholder="Ex: Clicar no botão de orçamento">
                    </div>
                </div>
            </section>

            <!-- 2. PÚBLICO-ALVO -->
            <section class="form-card p-6">
                <h2 class="section-title text-xl uppercase tracking-wider">2. Público-Alvo</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Quem é o cliente ideal?</label>
                        <input type="text" name="cliente_ideal" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 bg-gray-50 border focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Faixa Etária?</label>
                        <input type="text" name="idade" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 bg-gray-50 border focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Classe Social?</label>
                        <select name="classe_social" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm p-2 bg-gray-50 border">
                            <option>Baixo Padrão</option>
                            <option>Médio Padrão</option>
                            <option>Alto Padrão</option>
                        </select>
                    </div>
                </div>
            </section>

            <!-- 3. SOBRE O NEGÓCIO -->
            <section class="form-card p-6">
                <h2 class="section-title text-xl uppercase tracking-wider">3. Sobre o Negócio</h2>
                <div class="space-y-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" name="empresa_nome" placeholder="Nome da Empresa" class="p-2 bg-gray-50 border rounded-md">
                        <input type="text" name="tempo_mercado" placeholder="Tempo de mercado" class="p-2 bg-gray-50 border rounded-md">
                    </div>
                    <textarea name="resumo_negocio" placeholder="O que a empresa faz? (Resumo)" class="w-full p-2 bg-gray-50 border rounded-md h-24"></textarea>
                    <input type="text" name="diferencial" placeholder="Seu principal diferencial" class="w-full p-2 bg-gray-50 border rounded-md">
                </div>
            </section>

            <!-- 4. IDENTIDADE VISUAL -->
            <section class="form-card p-6">
                <h2 class="section-title text-xl uppercase tracking-wider">4. Identidade Visual & Estilo</h2>
                <div class="grid grid-cols-2 md:grid-cols-3 gap-3 mb-4">
                    <label class="flex items-center space-x-2 border p-2 rounded cursor-pointer hover:bg-gray-100">
                        <input type="radio" name="estilo" value="Moderno"> <span>Moderno</span>
                    </label>
                    <label class="flex items-center space-x-2 border p-2 rounded cursor-pointer hover:bg-gray-100">
                        <input type="radio" name="estilo" value="Clean"> <span>Clean</span>
                    </label>
                    <label class="flex items-center space-x-2 border p-2 rounded cursor-pointer hover:bg-gray-100">
                        <input type="radio" name="estilo" value="Minimalista"> <span>Minimalista</span>
                    </label>
                </div>
                <input type="text" name="cores" placeholder="Cores preferidas (Ex: Azul e Branco)" class="w-full p-2 bg-gray-50 border rounded-md">
            </section>

            <!-- 5. ESTRUTURA (CHECKBOXES) -->
            <section class="form-card p-6">
                <h2 class="section-title text-xl uppercase tracking-wider">5. Estrutura do Site</h2>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <label class="flex items-center space-x-2"><input type="checkbox" name="secoes[]" value="Hero"> <span>Capa (Hero)</span></label>
                    <label class="flex items-center space-x-2"><input type="checkbox" name="secoes[]" value="Sobre"> <span>Sobre</span></label>
                    <label class="flex items-center space-x-2"><input type="checkbox" name="secoes[]" value="Servicos"> <span>Serviços</span></label>
                    <label class="flex items-center space-x-2"><input type="checkbox" name="secoes[]" value="Depoimentos"> <span>Depoimentos</span></label>
                    <label class="flex items-center space-x-2"><input type="checkbox" name="secoes[]" value="FAQ"> <span>FAQ</span></label>
                    <label class="flex items-center space-x-2"><input type="checkbox" name="secoes[]" value="Portfolio"> <span>Portfólio</span></label>
                </div>
            </section>

            <!-- 6. CONTATO DO CLIENTE -->
            <section class="form-card p-6">
                <h2 class="section-title text-xl uppercase tracking-wider">6. Suas Informações de Contato</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <input type="text" name="cli_whatsapp" id="cli_whatsapp" placeholder="Seu WhatsApp" required class="p-2 bg-gray-50 border rounded-md">
                    <input type="email" name="_replyto" placeholder="Seu E-mail" required class="p-2 bg-gray-50 border rounded-md">
                </div>
            </section>

            <!-- BOTÕES DE AÇÃO -->
            <div class="flex flex-col md:flex-row gap-4">
                <button type="submit" class="flex-1 bg-gray-800 text-white font-bold py-4 rounded-lg hover:bg-gray-900 transition shadow-lg">
                    ENVIAR POR E-MAIL
                </button>
                <button type="button" onclick="sendToWhatsApp()" class="flex-1 bg-green-500 text-white font-bold py-4 rounded-lg hover:bg-green-600 transition shadow-lg flex items-center justify-center">
                    <svg class="w-6 h-6 mr-2" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
                    ENVIAR WHATSAPP
                </button>
            </div>
        </form>

        <footer class="mt-12 text-center text-gray-500 text-sm">
            <p>&copy; 2023 Seu Nome - Consultoria Web</p>
        </footer>
    </div>

    <script>
        function sendToWhatsApp() {
            const form = document.getElementById('briefingForm');
            const formData = new FormData(form);
            
            // Substitua pelo seu número (DDI + DDD + Número)
            const meuNumero = "5583987325752"; 
            
            let mensagem = "🚀 *Novo Briefing de Site*\n\n";
            
            // Loop para pegar os dados
            formData.forEach((value, key) => {
                if (value && key !== "_replyto") {
                    mensagem += `*${key.replace('_', ' ').toUpperCase()}:* ${value}\n`;
                }
            });

            const encodedMessage = encodeURIComponent(mensagem);
            const whatsappUrl = `https://wa.me/${meuNumero}?text=${encodedMessage}`;
            
            window.open(whatsappUrl, '_blank');
        }
    </script>
</body>
</html>
